<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Set theme before paint to avoid a flash. Default: dark.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var dark = t ? t === "dark" : false;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Gauresh Kapoor | Portfolio</title>
    <meta name="description" content="Gauresh Kapoor — Portfolio." />
    <meta name="author" content="Gauresh Kapoor" />

    <meta property="og:title" content="Gauresh Kapoor | Portfolio" />
    <meta property="og:description" content="Gauresh Kapoor — Portfolio." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  </body>
</html>
